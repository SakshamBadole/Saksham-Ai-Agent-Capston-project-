version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: smartseller_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: smartseller
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: smartseller_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@smartseller.ai
      PGADMIN_DEFAULT_PASSWORD: adminpassword
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data:
